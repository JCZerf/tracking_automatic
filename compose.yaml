services:
  tracking-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://tracking-automatic-web.vercel.app}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-300}"
      CACHE_MAX_ENTRIES: "${CACHE_MAX_ENTRIES:-100}"
      RATE_LIMIT_REQUESTS: "${RATE_LIMIT_REQUESTS:-10}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    cpus: 1.0
    mem_limit: 512m
    init: true
    restart: unless-stopped
    volumes:
      - paddle-models:/home/appuser/.paddlex
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  paddle-models:
